name: Regression Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  regression-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, sqlite3
          coverage: none

      - name: Enforce MUST-04 guardrails
        run: bash scripts/check_must04.sh

      - name: Enforce Action Hierarchy guardrails
        run: bash scripts/check_action_hierarchy.sh

      - name: Enforce MUST-10 accessibility guardrails
        run: bash scripts/check_must10.sh

      - name: Enforce MUST-11 visual baseline guardrails
        run: bash scripts/check_must11.sh

      - name: Run regression tests
        run: php scripts/regression_tests.php
